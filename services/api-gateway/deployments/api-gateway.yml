apiVersion: apps/v1
kind: Deployment

metadata:
  name: api-gateway
  labels:
    app: api-gateway

spec:
  replicas: 1

  selector:
    matchLabels:
      app: api-gateway

  template:
    metadata:
      labels:
        app: api-gateway

    spec:
      containers:
        - name: api-gateway
          image: api-gateway
          imagePullPolicy: Never

          ports:
            - name: http
              containerPort: 8080

          env:
            - name: PORT
              value: "8080"

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"

            limits:
              cpu: "1000m"
              memory: "512Mi"

---
apiVersion: v1
kind: Service

metadata:
  name: api-gateway

spec:
  type: ClusterIP

  selector:
    app: api-gateway

  ports:
    - name: http
      port: 8080
      targetPort: 8080
