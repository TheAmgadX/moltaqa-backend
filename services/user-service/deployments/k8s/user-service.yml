apiVersion: apps/v1
kind: Deployment

metadata:
  name: user-service
  labels:
    app: user-service

spec:
  replicas: 1

  selector:
    matchLabels:
      app: user-service

  template:
    metadata:
      labels:
        app: user-service

    spec:
      containers:
        - name: user-service
          image: user-service
          imagePullPolicy: Never

          ports:
            - name: grpc
              containerPort: 50051
              protocol: TCP

          env:
            - name: GRPC_PORT
              value: "50051"

            # Database connection details
            - name: DB_HOST
              value: "postgres-user-service"
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: postgres-user-secret
                  key: POSTGRES_DB
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-user-secret
                  key: POSTGRES_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-user-secret
                  key: POSTGRES_PASSWORD

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"

            limits:
              cpu: "1000m"
              memory: "512Mi"

---
apiVersion: v1
kind: Service

metadata:
  name: user-service

spec:
  type: ClusterIP

  selector:
    app: user-service

  ports:
    - name: grpc
      port: 50051
      targetPort: 50051
      protocol: TCP
      appProtocol: grpc
