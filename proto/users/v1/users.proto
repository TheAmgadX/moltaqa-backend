syntax = "proto3";

package users.v1;

import "google/protobuf/timestamp.proto";
import "google/protobuf/wrappers.proto";

option go_package = "shared/proto/users;users";

service UsersService {
  rpc CreateUser(CreateUserRequest) returns (CreateUserResponse);

  rpc RegisterContact(RegisterContactRequest) returns (RegisterContactResponse);

  rpc UpdateUser(UpdateUserRequest) returns (UpdateUserResponse);

  rpc VerifyEmail(VerifyContactRequest) returns (VerifyContactResponse);

  rpc VerifyPhone(VerifyContactRequest) returns (VerifyContactResponse);

  rpc DeleteUser(DeleteUserRequest) returns (DeleteUserResponse);

  rpc RestoreUser(RestoreUserRequest) returns (RestoreUserResponse);

  rpc GetUser(GetUserRequest) returns (GetUserResponse);

  rpc GetUsers(GetUsersRequest) returns (GetUsersResponse);

  rpc GetUserSummary(GetUserSummaryRequest) returns (GetUserSummaryResponse);

  rpc GetUsersSummary(GetUsersSummaryRequest) returns (GetUsersSummaryResponse);

  rpc SearchUsers(SearchUsersRequest) returns (SearchUsersResponse);

  rpc UserExists(UserExistsRequest) returns (UserExistsResponse);

  rpc UsersExist(UsersExistRequest) returns (UsersExistResponse);

  rpc GetPrivacySettings(GetPrivacySettingsRequest) returns (GetPrivacySettingsResponse);

  rpc UpdatePrivacySettings(UpdatePrivacySettingsRequest) returns (UpdatePrivacySettingsResponse);
}

enum Visibility {
  EVERYONE = 0;
  FRIENDS = 1;
  CONTACTS = 2;
  NOBODY = 3;
}

enum AccountBadge {
  UNVERIFIED = 0;
  BLUE_BADGE = 1;
  GOLD_BADGE = 2;
  SILVER_BADGE = 3;
}

message User {
  string id = 1;

  string username = 2;

  string display_name = 3;

  string email = 4;

  string phone = 5;

  string profile_image_url = 6;

  string bio = 7;

  string bio_status = 8;

  google.protobuf.Timestamp email_verified = 9;

  google.protobuf.Timestamp phone_verified = 10;

  AccountBadge account_badge = 11;

  uint32 friends_count = 12;

  uint32 followers_count = 13;

  uint32 following_count = 14;

  uint32 posts_count = 15;

  google.protobuf.Timestamp birth_date = 16;

  google.protobuf.Timestamp created_at = 17;

  google.protobuf.Timestamp updated_at = 18;
}

message UserSummary {
  string id = 1;

  string username = 2;

  string display_name = 3;

  string phone_number = 4;

  string profile_image_url = 5;

  AccountBadge account_badge = 6;
}

message PrivacySettings {
  Visibility avatar_visibility = 1;

  Visibility phone_visibility = 2;

  Visibility email_visibility = 3;

  Visibility last_seen_visibility = 4;

  bool read_receipts_enabled = 5;

  bool find_by_username = 6;
}

message CreateUserRequest {
  string id = 1;

  string username = 2;

  string email = 3;

  string phone = 4;

  string display_name = 5;
}

message CreateUserResponse {
  User user = 1;
}

message RegisterContactRequest {
  string user_id = 1;
  oneof contact_type {
    string phone = 2;
    string email = 3;
  }
}

message RegisterContactResponse {}

message VerifyContactRequest {
  string user_id = 1;
}

message VerifyContactResponse {}

message UpdateUserRequest {
  string id = 1;

  string username = 2;

  string display_name = 3;

  string profile_image_url = 6;

  string bio = 7;

  string bio_status = 8;

  AccountBadge account_badge = 11;

  uint32 friends_count = 12;

  uint32 followers_count = 13;

  uint32 following_count = 14;

  uint32 posts_count = 15;

  google.protobuf.Timestamp birth_date = 16;
}

message UpdateUserResponse {}

message DeleteUserRequest {
  string id = 1;
}

message DeleteUserResponse {}

message RestoreUserRequest {
  string id = 1;
}

message RestoreUserResponse {}

message GetUserRequest {
  oneof lookup {
    string id = 1;

    string username = 2;

    string email = 3;

    string phone = 4;
  }
}

message GetUserResponse {
  User user = 1;
}

message GetUsersRequest {
  repeated string user_ids = 1;
}

message GetUsersResponse {
  repeated User users = 1;
}

message GetUserSummaryRequest {
  string id = 1;
}

message GetUserSummaryResponse {
  UserSummary user = 1;
}

message GetUsersSummaryRequest {
  repeated string user_ids = 1;
}

message GetUsersSummaryResponse {
  repeated UserSummary users = 1;
}

message SearchUsersRequest {
  string query = 1;

  uint32 page = 2;

  uint32 page_size = 3;
}

message SearchUsersResponse {
  repeated UserSummary users = 1;

  bool has_more = 3;
}

message UserExistsRequest {
  oneof lookup {
    string id = 1;

    string username = 2;

    string email = 3;

    string phone = 4;
  }
}

message UserExistsResponse {
  bool exists = 1;
}

message UsersExistRequest {
  repeated string user_ids = 1;
}

message UserExistence {
  string user_id = 1;

  bool exists = 2;
}

message UsersExistResponse {
  repeated UserExistence users = 1;
}

message GetPrivacySettingsRequest {
  string user_id = 1;
}

message GetPrivacySettingsResponse {
  PrivacySettings settings = 1;
}

message UpdatePrivacySettingsRequest {
  string user_id = 1;

  google.protobuf.Int32Value avatar_visibility = 2;

  google.protobuf.Int32Value phone_visibility = 3;

  google.protobuf.Int32Value email_visibility = 4;

  google.protobuf.Int32Value last_seen_visibility = 5;

  bool read_receipts_enabled = 6;

  bool find_by_username = 7;
}

message UpdatePrivacySettingsResponse {}
