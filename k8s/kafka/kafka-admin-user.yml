apiVersion: kafka.strimzi.io/v1
kind: KafkaUser
metadata:
  name: kafka-admin
  namespace: kafka
  labels:
    strimzi.io/cluster: kafka
spec:
  authentication:
    type: scram-sha-512

  authorization:
    type: simple
    acls:
      - resource:
          type: cluster
        operations:
          - All

      - resource:
          type: topic
          name: "*"
          patternType: literal
        operations:
          - All

      - resource:
          type: group
          name: "*"
          patternType: literal
        operations:
          - All
